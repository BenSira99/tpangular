<div class="conteneur-bouton">
  <button (click)="cliquerBouton()" class="bouton-primaire">
    {{ estAffiche ? 'Masquer le message' : 'Afficher le message' }}
  </button>
</div>

@if (estAffiche) {
  <app-message [personneAffichee]="utilisateurActuel"></app-message>
}

<app-liste-personnes [tableauPersonnes]="listeUtilisateurs"></app-liste-personnes>
